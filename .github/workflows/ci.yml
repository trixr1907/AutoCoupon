name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run harness:build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extension-builds
          path: |
            dist/chromium
            dist/firefox
            dist/harness

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: packages/*.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: packages/*.zip
