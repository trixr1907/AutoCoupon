<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCoupon</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 340px;
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
      }

      .container {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-box {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: linear-gradient(135deg, #00f3ff 0%, #bd00ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
      }

      .logo-box svg {
        width: 22px;
        height: 22px;
        color: white;
      }

      .title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        background: linear-gradient(90deg, #00f3ff, #bd00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        margin: 2px 0 0 0;
        font-size: 11px;
        color: #64748b;
        font-weight: 500;
      }

      /* Quick Links */
      .quick-links {
        display: flex;
        gap: 8px;
      }

      .quick-link {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 8px;
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(51, 65, 85, 0.5);
        border-radius: 8px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .quick-link:hover {
        background: rgba(51, 65, 85, 0.6);
        color: #f1f5f9;
        border-color: rgba(0, 243, 255, 0.3);
      }

      .quick-link svg {
        width: 14px;
        height: 14px;
      }

      /* Status Box */
      .status-box {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(51, 65, 85, 0.5);
        border-radius: 8px;
        padding: 10px 12px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status-text {
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
      }

      /* Main Button */
      .action-btn {
        width: 100%;
        background: linear-gradient(90deg, #00f3ff 0%, #bd00ff 100%);
        border: none;
        border-radius: 10px;
        padding: 14px;
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0, 243, 255, 0.25);
      }

      .action-btn svg {
        width: 18px;
        height: 18px;
      }

      .action-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 243, 255, 0.4);
      }

      .action-btn:active {
        transform: translateY(1px);
      }

      /* How-To Section */
      .howto-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px;
        background: transparent;
        border: 1px dashed rgba(100, 116, 139, 0.5);
        border-radius: 6px;
        color: #64748b;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .howto-toggle:hover {
        border-color: #94a3b8;
        color: #94a3b8;
      }

      .howto-toggle svg {
        width: 12px;
        height: 12px;
        transition: transform 0.2s;
      }

      .howto-toggle.open svg {
        transform: rotate(180deg);
      }

      .howto-content {
        display: none;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(51, 65, 85, 0.5);
        border-radius: 8px;
        padding: 12px;
        margin-top: 8px;
      }

      .howto-content.show {
        display: block;
      }

      .howto-step {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }

      .howto-step:last-child {
        margin-bottom: 0;
      }

      .step-num {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #00f3ff 0%, #bd00ff 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .step-text {
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.4;
      }

      /* Footer */
      .footer {
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 10px;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      .footer-link {
        font-size: 10px;
        color: #64748b;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 1px;
        transition: color 0.2s;
      }

      .footer-link:hover {
        color: #00f3ff;
      }

      .footer-version {
        font-size: 9px;
        color: #475569;
        font-family: monospace;
      }

      /* Support Links */
      .support-links {
        display: flex;
        gap: 8px;
      }

      .support-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 8px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 11px;
        font-weight: 600;
        transition: all 0.2s;
      }

      .support-btn.donate {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
        box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
      }

      .support-btn.donate:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
      }

      .support-btn.website {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(0, 243, 255, 0.3);
        color: #00f3ff;
      }

      .support-btn.website:hover {
        background: rgba(0, 243, 255, 0.1);
        border-color: rgba(0, 243, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <div>
          <h1 class="title">AutoCoupon</h1>
          <p class="subtitle">by Ivo Tech</p>
        </div>
      </div>

      <!-- Quick Links -->
      <div class="quick-links">
        <a href="https://www.payback.de" target="_blank" class="quick-link">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          Payback Home
        </a>
        <a
          href="https://www.payback.de/coupons"
          target="_blank"
          class="quick-link"
        >
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"
            />
          </svg>
          Coupons
        </a>
      </div>

      <!-- Status -->
      <div class="status-box">
        <div class="status-row">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text"
            >Bereit zur Aktivierung</span
          >
        </div>
      </div>

      <!-- Action Button -->
      <button id="activate-btn" class="action-btn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>Coupons Aktivieren</span>
      </button>

      <!-- How-To Toggle -->
      <button class="howto-toggle" id="howto-toggle">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
        Anleitung anzeigen
      </button>

      <!-- How-To Content -->
      <div class="howto-content" id="howto-content">
        <div class="howto-step">
          <div class="step-num">1</div>
          <div class="step-text">
            Öffne die <strong>Payback Coupon-Seite</strong> über den Link oben.
          </div>
        </div>
        <div class="howto-step">
          <div class="step-num">2</div>
          <div class="step-text">
            <strong>Logge dich ein</strong> mit deinem Payback-Konto.
          </div>
        </div>
        <div class="howto-step">
          <div class="step-num">3</div>
          <div class="step-text">
            Klicke auf <strong>"Coupons Aktivieren"</strong> – fertig! 🎉
          </div>
        </div>
      </div>

      <!-- Support Links -->
      <div class="support-links">
        <a
          href="https://ko-fi.com/ivotech"
          target="_blank"
          class="support-btn donate"
        >
          ☕ Unterstützen
        </a>
        <a
          href="https://ivo-tech.com"
          target="_blank"
          class="support-btn website"
        >
          🌐 ivo-tech.com
        </a>
      </div>

      <!-- Footer -->
      <div class="footer">
        <a href="https://ivo-tech.com" target="_blank" class="footer-link"
          >IVO TECH</a
        >
        <span class="footer-version">v2.0</span>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
