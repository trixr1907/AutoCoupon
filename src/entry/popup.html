<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payback Activator</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      
      /* Header & Branding */
      .header-container {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-box {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: linear-gradient(135deg, #00f3ff 0%, #bd00ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(0, 243, 255, 0.3);
      }
      
      .logo-box svg {
        width: 20px;
        height: 20px;
        color: white;
      }

      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        background: linear-gradient(90deg, #00f3ff, #bd00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .subtitle {
        margin: 0;
        font-size: 11px;
        color: #64748b;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      /* Status Box */
      .status-box {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(51, 65, 85, 0.5);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 2px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #64748b;
      }
      
      .status-text {
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
      }

      /* Main Button */
      .action-btn {
        width: 100%;
        background: linear-gradient(90deg, #00f3ff 0%, #bd00ff 100%);
        border: none;
        border-radius: 12px;
        padding: 14px;
        color: white;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0, 243, 255, 0.25);
        position: relative;
        overflow: hidden;
      }

      .action-btn svg {
          width: 20px;
          height: 20px;
          flex-shrink: 0;
      }

      .action-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 243, 255, 0.4);
      }

      .action-btn:active {
        transform: translateY(1px);
      }
      
      .action-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        background: #334155;
        box-shadow: none;
      }

      /* Footer */
      .footer {
        margin-top: auto;
        border-top: 1px solid rgba(255,255,255,0.05);
        padding-top: 10px;
        text-align: center;
      }
      
      .footer-tag {
        font-size: 10px;
        color: #475569;
        font-family: monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      
      .container {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: white;
      }
      
      .status-text {
        font-size: 12px;
        color: #94a3b8;
        margin: 0;
      }

      .action-btn {
        background: linear-gradient(90deg, #0ea5e9 0%, #3b82f6 100%);
        border: none;
        border-radius: 8px;
        padding: 12px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .action-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
      }

      .action-btn:active {
        transform: translateY(1px);
      }
      
      .action-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        background: #334155;
      }

      .footer {
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 12px;
        font-size: 11px;
        color: #64748b;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header-container">
        <div class="logo-box">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div>
          <h1 class="title">Payback Activator</h1>
          <p class="subtitle">by Ivo Tech</p>
        </div>
      </div>
      
      <!-- Status -->
      <div id="status" class="status-box">
        <div class="status-row">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text">Bereit</span>
        </div>
      </div>

      <!-- Action Button -->
      <button id="activate-btn" class="action-btn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Coupons Aktivieren</span>
      </button>

      <!-- Footer -->
      <div class="footer">
         <span class="footer-tag">IVO TECH EDITION</span>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
</body>
</html>
